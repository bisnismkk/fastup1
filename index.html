<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pemesanan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }
        /* Hide number input arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="antialiased text-gray-800 pb-32"> <!-- Ditambah padding bottom agar tidak tertutup footer -->

    <!-- Container Utama (Max width agar terlihat rapi di Desktop & HP) -->
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-sm relative">

        <!-- Header / Logo, Judul, Deskripsi -->
        <header class="pt-8 pb-6 px-6 text-center border-b border-gray-100 bg-white">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-orange-100 text-orange-600 mb-4 shadow-sm">
                <!-- Logo Produk -->
                <i data-lucide="coffee" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">Kedai Rasa Makmur</h1>
            <p class="text-sm text-gray-500 mb-4">Pesan menu favoritmu dengan mudah. Silakan isi detail pesanan di bawah ini.</p>
            
            <!-- Instagram Bisnis -->
            <a href="https://instagram.com/kedairasamakmur" target="_blank" class="inline-flex items-center gap-2 text-sm text-pink-600 font-medium hover:text-pink-700 bg-pink-50 px-3 py-1.5 rounded-full transition-colors">
                <i data-lucide="instagram" class="w-4 h-4"></i>
                @kedairasamakmur
            </a>
        </header>

        <!-- Form Mulai -->
        <form id="orderForm" class="p-6 space-y-8">
            
            <!-- Informasi Pemesan -->
            <section>
                <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                    <i data-lucide="user" class="w-5 h-5 text-orange-500"></i> Data Pemesan
                </h2>
                <div class="space-y-4">
                    <div>
                        <label for="nama" class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                        <input type="text" id="nama" required placeholder="Contoh: Budi Santoso" 
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all">
                    </div>
                    <div>
                        <label for="whatsapp" class="block text-sm font-medium text-gray-700 mb-1">Nomor WhatsApp</label>
                        <input type="tel" id="whatsapp" required placeholder="Contoh: 08123456789" 
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all">
                    </div>
                </div>
            </section>

            <hr class="border-gray-100">

            <!-- Varian Menu -->
            <section>
                <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                    <i data-lucide="shopping-bag" class="w-5 h-5 text-orange-500"></i> Pilihan Menu
                </h2>
                <div id="menuContainer" class="space-y-4">
                    <!-- Item menu akan di-render menggunakan JavaScript -->
                </div>
            </section>

            <hr class="border-gray-100">

            <!-- Detail Pengambilan -->
            <section>
                <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                    <i data-lucide="map-pin" class="w-5 h-5 text-orange-500"></i> Detail Pengambilan
                </h2>
                
                <div class="space-y-5">
                    <!-- Metode Pengambilan -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Metode Pengambilan</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="relative cursor-pointer">
                                <input type="radio" name="metode" value="Ambil Sendiri" class="peer sr-only" checked>
                                <div class="p-3 border rounded-xl text-center text-sm font-medium peer-checked:bg-orange-50 peer-checked:border-orange-500 peer-checked:text-orange-700 transition-all">
                                    Ambil Sendiri
                                </div>
                            </label>
                            <label class="relative cursor-pointer">
                                <input type="radio" name="metode" value="Ojek Online (GoSend/Grab)" class="peer sr-only">
                                <div class="p-3 border rounded-xl text-center text-sm font-medium peer-checked:bg-orange-50 peer-checked:border-orange-500 peer-checked:text-orange-700 transition-all">
                                    Ojek Online
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Tanggal -->
                    <div>
                        <label for="tanggal" class="block text-sm font-medium text-gray-700 mb-1">Tanggal Pengambilan</label>
                        <div class="relative">
                            <i data-lucide="calendar" class="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                            <input type="date" id="tanggal" required
                                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all text-gray-700">
                        </div>
                    </div>

                    <!-- Jam -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Jam Pengambilan</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="relative cursor-pointer">
                                <input type="radio" name="jam" value="10.00-10.30" class="peer sr-only" required>
                                <div class="p-3 border rounded-xl text-center text-sm font-medium peer-checked:bg-orange-50 peer-checked:border-orange-500 peer-checked:text-orange-700 transition-all flex items-center justify-center gap-2">
                                    <i data-lucide="clock" class="w-4 h-4"></i> 10.00 - 10.30
                                </div>
                            </label>
                            <label class="relative cursor-pointer">
                                <input type="radio" name="jam" value="13.00-14.00" class="peer sr-only">
                                <div class="p-3 border rounded-xl text-center text-sm font-medium peer-checked:bg-orange-50 peer-checked:border-orange-500 peer-checked:text-orange-700 transition-all flex items-center justify-center gap-2">
                                    <i data-lucide="clock" class="w-4 h-4"></i> 13.00 - 14.00
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
            </section>

        </form>

        <!-- Sticky Footer untuk Rincian Total & Tombol Pesan -->
        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 p-4 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-50">
            <div class="flex flex-col mb-3">
                <div class="flex items-center justify-between text-sm text-gray-500 mb-1">
                    <span>Jumlah Item:</span>
                    <span id="totalItem" class="font-medium text-gray-700">0 Item</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-gray-800 font-semibold text-lg">Total Pemesanan</span>
                    <span id="totalHarga" class="text-2xl font-bold text-orange-600">Rp 0</span>
                </div>
            </div>
            <button type="button" onclick="kirimKeWhatsApp()" id="btnSubmit" 
                class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors focus:ring-4 focus:ring-green-100 outline-none">
                <i data-lucide="message-circle" class="w-5 h-5"></i>
                Pesan via WhatsApp
            </button>
        </div>

    </div>

    <!-- Script JavaScript -->
    <script>
        // Inisialisasi Lucide Icons
        lucide.createIcons();

        // Data Menu (Bisa ditambah atau diubah)
        const menus = [
            { id: 1, nama: "Dimsum", harga: 7000, qty: 0, deskripsi: "Kopi espresso dengan susu segar dan gula aren asli." },
            { id: 2, nama: "Sawi Roll", harga: 6000, qty: 0, deskripsi: "Matcha premium blend dengan susu." },
            { id: 3, nama: "Cilok Protein", harga: 6000, qty: 0, deskripsi: "Pastry renyah dengan rasa mentega lezat." },
            { id: 4, nama: "Saus Tambahan", harga: 35000, qty: 0, deskripsi: "Nasi goreng ayam, telur mata sapi, dan kerupuk." }
        ];

        // Format Rupiah
        const formatRupiah = (angka) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        };

        // Nomor WhatsApp Tujuan (Ganti dengan nomor bisnis Anda, gunakan kode negara 62)
        const NOMOR_WHATSAPP_BISNIS = "6281234567890";

        // Render Menu ke dalam HTML
        const renderMenu = () => {
            const container = document.getElementById('menuContainer');
            container.innerHTML = '';

            menus.forEach((menu, index) => {
                // Tampilkan total per item jika qty > 0
                const displayTotalPerItem = menu.qty > 0 ? `block` : `hidden`;
                const totalPerItem = menu.harga * menu.qty;

                const itemHtml = `
                    <div class="flex flex-col p-4 border border-gray-100 rounded-2xl bg-white shadow-sm hover:border-orange-200 transition-colors">
                        <div class="flex items-center justify-between">
                            <div class="flex-1 pr-4">
                                <h3 class="font-semibold text-gray-900">${menu.nama}</h3>
                                <p class="text-xs text-gray-500 mt-1 line-clamp-1">${menu.deskripsi}</p>
                                <p class="text-orange-600 font-bold text-sm mt-2">${formatRupiah(menu.harga)}</p>
                            </div>
                            <div class="flex items-center gap-3 bg-gray-50 p-1.5 rounded-xl border border-gray-200">
                                <button type="button" onclick="updateQty(${index}, -1)" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white text-gray-600 shadow-sm hover:bg-gray-100 active:bg-gray-200 transition-colors">
                                    <i data-lucide="minus" class="w-4 h-4"></i>
                                </button>
                                <span class="w-6 text-center font-bold text-gray-800 text-sm" id="qty-${index}">${menu.qty}</span>
                                <button type="button" onclick="updateQty(${index}, 1)" class="w-8 h-8 flex items-center justify-center rounded-lg bg-orange-500 text-white shadow-sm hover:bg-orange-600 active:bg-orange-700 transition-colors">
                                    <i data-lucide="plus" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <!-- Subtotal per item -->
                        <div id="subtotal-container-${index}" class="${displayTotalPerItem} mt-3 pt-3 border-t border-dashed border-gray-200 flex justify-between items-center">
                            <span class="text-xs text-gray-500">Subtotal:</span>
                            <span id="subtotal-${index}" class="text-sm font-semibold text-gray-800">${formatRupiah(totalPerItem)}</span>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHtml);
            });
            lucide.createIcons();
            hitungTotal();
        };

        // Fungsi Update Kuantitas
        const updateQty = (index, change) => {
            let newQty = menus[index].qty + change;
            if (newQty < 0) newQty = 0;
            menus[index].qty = newQty;
            
            // Update tampilan qty
            document.getElementById(`qty-${index}`).innerText = newQty;
            
            // Update subtotal per item
            const subtotalContainer = document.getElementById(`subtotal-container-${index}`);
            const subtotalText = document.getElementById(`subtotal-${index}`);
            
            if (newQty > 0) {
                subtotalContainer.classList.remove('hidden');
                subtotalText.innerText = formatRupiah(menus[index].harga * newQty);
            } else {
                subtotalContainer.classList.add('hidden');
            }

            hitungTotal();
        };

        // Fungsi Hitung Total Harga & Item
        const hitungTotal = () => {
            let totalHarga = 0;
            let totalItem = 0;

            menus.forEach(menu => {
                totalHarga += (menu.harga * menu.qty);
                totalItem += menu.qty;
            });

            document.getElementById('totalHarga').innerText = formatRupiah(totalHarga);
            document.getElementById('totalItem').innerText = `${totalItem} Item`;
            
            return totalHarga;
        };

        // Set minimal tanggal ke hari ini
        const setMinDate = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById("tanggal").setAttribute('min', today);
        };

        // Pesan Error Custom (Bisa diganti alert bawaan browser jika mau)
        const showError = (message) => {
            alert(message);
        }

        // Fungsi Validasi & Kirim ke WhatsApp
        const kirimKeWhatsApp = () => {
            const nama = document.getElementById('nama').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const metode = document.querySelector('input[name="metode"]:checked').value;
            const tanggal = document.getElementById('tanggal').value;
            const jam = document.querySelector('input[name="jam"]:checked');

            // Validasi Data
            if(!nama) return showError("Mohon isi Nama Lengkap Anda terlebih dahulu.");
            if(!whatsapp) return showError("Mohon isi Nomor WhatsApp Anda terlebih dahulu.");
            if(!tanggal) return showError("Mohon pilih Tanggal Pengambilan pesanan Anda.");
            if(!jam) return showError("Mohon pilih Jam Pengambilan pesanan Anda.");

            const totalBelanja = hitungTotal();
            if(totalBelanja === 0) return showError("Anda belum memilih menu pesanan. Silakan tambah jumlah menu terlebih dahulu.");

            // Kumpulkan pesanan
            let daftarPesanan = '';
            menus.forEach(menu => {
                if(menu.qty > 0) {
                    daftarPesanan += `- ${menu.nama}\n  ${menu.qty} x ${formatRupiah(menu.harga)} = ${formatRupiah(menu.harga * menu.qty)}\n`;
                }
            });

            // Format tanggal jadi lebih cantik (DD/MM/YYYY)
            const dateObj = new Date(tanggal);
            const formattedDate = `${dateObj.getDate().toString().padStart(2, '0')}/${(dateObj.getMonth()+1).toString().padStart(2, '0')}/${dateObj.getFullYear()}`;

            // Template Pesan WA
            const textPesan = `Halo *Kedai Rasa Makmur*, saya ingin melakukan pemesanan:

*Data Pemesan*
👤 Nama: ${nama}
📞 No. WA: ${whatsapp}

*Daftar Pesanan*
${daftarPesanan}
*========================*
*Total Nilai Pemesanan: ${formatRupiah(totalBelanja)}*

*Detail Pengambilan*
📦 Metode: ${metode}
📅 Tanggal: ${formattedDate}
⏰ Jam: ${jam.value}

Mohon konfirmasi pesanannya ya. Terima kasih!`;

            // Buat URL dan Redirect
            const urlEncodedText = encodeURIComponent(textPesan);
            const waUrl = `https://wa.me/${NOMOR_WHATSAPP_BISNIS}?text=${urlEncodedText}`;
            
            window.open(waUrl, '_blank');
        };

        // Panggil saat halaman pertama dimuat
        window.onload = () => {
            renderMenu();
            setMinDate();
        };
    </script>
</body>
</html>
